# dreamcue default configuration
# Values here are the baseline; per-arm/per-phase configs override.

model:
  name: meta-llama/Llama-3.2-1B-Instruct
  dtype: float16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

data:
  seed: 1337
  n_learn_facts: 600
  flag_rate: 0.20
  n_interference_facts: 2000
  probe_paraphrases_per_fact: 1

learn_phase:
  epochs: 8
  lr: 2.0e-4
  batch_size: 16
  max_seq_len: 128
  target_probe_accuracy: 0.90

interference_phase:
  total_steps: 2000
  lr: 5.0e-4
  batch_size: 8
  checkpoint_every: 200

replay:
  # Budget B is measured in TRAINING TOKENS, not example count.
  budget_tokens: 32768
  oversampling_ratio: 5.0  # flagged sampling probability multiplier (cued arm)
  token_match_tolerance: 0.01  # |uniform - cued| / uniform must be < this

seeds:
  list: [11, 22, 33]

modal:
  # GPU: H100 chosen 2026-05-19 after Modal's public GPU list confirmed no
  # MI300X (see docs/decisions.md). Reel framing updated accordingly.
  gpu: "H100"
  timeout_s: 3600
  hard_cost_cap_usd: 25
